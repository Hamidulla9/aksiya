<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STARTMIX AKSIYA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #111111; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding-bottom: 70px; }
        .header { background: linear-gradient(135deg, #1f1f1f, #0a0a0a); padding: 25px 20px; text-align: center; border-bottom: 2px solid #ff6600; }
        .balance-title { font-size: 14px; color: #aaaaaa; text-transform: uppercase; letter-spacing: 1px; }
        .balance-value { font-size: 36px; font-weight: bold; color: #ff6600; margin-top: 5px; }
        .page { display: none; padding: 20px; }
        .active-page { display: block; }
        .code-container { background: #1a1a1a; padding: 20px; border-radius: 12px; border: 1px solid #333; text-align: center; margin-top: 20px; }
        .code-input { width: 100%; padding: 15px; font-size: 20px; text-align: center; letter-spacing: 4px; text-transform: uppercase; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; margin-bottom: 15px; }
        .primary-btn { width: 100%; background: #ff6600; color: #fff; border: none; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .product-list { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .product-card { background: #1a1a1a; border-radius: 12px; padding: 15px; text-align: center; border: 1px solid #222; }
        .product-name { font-size: 15px; font-weight: 600; margin-bottom: 5px; }
        .product-price { color: #ff6600; font-weight: bold; font-size: 14px; margin-bottom: 10px; }
        .buy-btn { background: #222; color: #fff; border: 1px solid #ff6600; padding: 8px; font-size: 12px; border-radius: 6px; width: 100%; cursor: pointer; }
        .top-section { margin-top: 30px; background: #1a1a1a; padding: 20px; border-radius: 12px; }
        .top-title { font-size: 16px; color: #ff6600; margin-bottom: 15px; font-weight: bold; }
        .top-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; font-size: 14px; }
        .top-item:last-child { border: none; }
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a1a; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #222; }
        .nav-item { background: none; border: none; color: #888888; font-size: 12px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .nav-item.active-nav { color: #ff6600; }
        .nav-icon { font-size: 20px; margin-bottom: 3px; }
        .profile-menu { background: #1a1a1a; border-radius: 12px; overflow: hidden; margin-top: 15px; }
        .profile-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #222; align-items: center; }
        select { background: #222; color: #fff; border: 1px solid #444; padding: 5px; border-radius: 4px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">
        <p class="balance-title" id="lang-balance-title">Balansingiz</p>
        <div class="balance-value"><span id="user-balance">0</span> <span id="lang-ball-text">ball</span></div>
    </div>

    <div id="page-main" class="page active-page">
        <div class="top-section">
            <p class="top-title" id="lang-top-title">🏆 TOP 5 FOYDALANUVCHI</p>
            <div id="top-list">
                </div>
        </div>
    </div>

    <div id="page-code" class="page">
        <div class="code-container">
            <h3 id="lang-input-title" style="margin-bottom: 10px;">6 Xonali Kodni Kiriting</h3>
            <input type="text" id="promo-code" class="code-input" maxlength="6" placeholder="X X X X X X">
            <button class="primary-btn" id="lang-submit-btn" onclick="sendCodeToBot()">Kodni Tasdiqlash</button>
        </div>
    </div>

    <div id="page-shop" class="page">
        <h3 id="lang-shop-title" style="color: #ff6600; margin-bottom: 10px;">Mahsulotlar</h3>
        <div class="product-list" id="product-container">
            </div>
    </div>

    <div id="page-profile" class="page">
        <h3 id="lang-settings-title">Sozlamalar</h3>
        <div class="profile-menu">
            <div class="profile-item">
                <span id="lang-select-lang">Tilni tanlash</span>
                <select id="language-select" onchange="changeLanguage(this.value)">
                    <option value="uz">O'zbekcha</option>
                    <option value="ru">Русский</option>
                    <option value="en">English</option>
                </select>
            </div>
            <div class="profile-item" style="cursor: pointer;" onclick="openSupport()">
                <span style="color: #ff6600; font-weight: bold;" id="lang-support">📞 Qo'llab-quvvatlash xizmati</span>
                <span>&gt;</span>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <button class="nav-item active-nav" onclick="switchTab('main', this)"><span class="nav-icon">🏠</span><span id="lang-nav-main">Asosiy</span></button>
        <button class="nav-item" onclick="switchTab('code', this)"><span class="nav-icon">⌨️</span><span id="lang-nav-code">Kod kiritish</span></button>
        <button class="nav-item" onclick="switchTab('shop', this)"><span class="nav-icon">🛍</span><span id="lang-nav-shop">Do'kon</span></button>
        <button class="nav-item" onclick="switchTab('profile', this)"><span class="nav-icon">👤</span><span id="lang-nav-profile">Profil</span></button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let userBalance = 0;
        let globalTopData = [];
        // Standart til: agar saqlanmagan bo'lsa 'uz' olinadi
        let currentLang = localStorage.getItem('selectedLanguage') || 'uz'; 

        // Tarjimalar paketi
        const translations = {
            uz: {
                balance_title: "Balansingiz",
                ball_text: "ball",
                top_title: "🏆 TOP 5 FOYDALANUVCHI",
                input_title: "6 Xonali Kodni Kiriting</h3>",
                submit_btn: "Kodni Tasdiqlash",
                shop_title: "Mahsulotlar",
                settings_title: "Sozlamalar",
                select_lang: "Tilni tanlash",
                support: "📞 Qo'llab-quvvatlash xizmati",
                nav_main: "Asosiy",
                nav_code: "Kod kiritish",
                nav_shop: "Do'kon",
                nav_profile: "Profil",
                no_points: "Hali hech kimda ball yo'q",
                alert_length: "Kod 6 xonali bo'lishi kerak!",
                alert_no_ball: "Ballaringiz yetarli emas!",
                confirm_buy: "mahsulotini {price} ballga sotib olasizmi?",
                buy_btn: "Sotib olish"
            },
            ru: {
                balance_title: "Ваш баланс",
                ball_text: "баллов",
                top_title: "🏆 ТОП 5 ПОЛЬЗОВАТЕЛЕЙ",
                input_title: "Введите 6-значный код",
                submit_btn: "Подтвердить код",
                shop_title: "Товары",
                settings_title: "Настройки",
                select_lang: "Выбор языка",
                support: "📞 Служба поддержки",
                nav_main: "Главная",
                nav_code: "Ввод кода",
                nav_shop: "Магазин",
                nav_profile: "Профиль",
                no_points: "Ни у кого еще нет баллов",
                alert_length: "Код должен быть 6-значным!",
                alert_no_ball: "Недостаточно баллов!",
                confirm_buy: "Вы хотите купить товар {name} за {price} баллов?",
                buy_btn: "Купить"
            },
            en: {
                balance_title: "Your Balance",
                ball_text: "points",
                top_title: "🏆 TOP 5 USERS",
                input_title: "Enter 6-Digit Code",
                submit_btn: "Confirm Code",
                shop_title: "Products",
                settings_title: "Settings",
                select_lang: "Select Language",
                support: "📞 Support Service",
                nav_main: "Main",
                nav_code: "Enter Code",
                nav_shop: "Shop",
                nav_profile: "Profile",
                no_points: "No one has points yet",
                alert_length: "Code must be 6 digits!",
                alert_no_ball: "Not enough points!",
                confirm_buy: "Do you want to buy {name} for {price} points?",
                buy_btn: "Buy Now"
            }
        };

        // Do'kon mahsulotlari ro'yxati (Uchala tildagi nomlari bilan)
        const products = [
            { id: 1, prices: 350, names: { uz: "Bolgarka", ru: "Болгарка", en: "Angle Grinder" } },
            { id: 2, prices: 500, names: { uz: "Perforator", ru: "Перфоратор", en: "Rotary Hammer" } },
            { id: 3, prices: 150, names: { uz: "Termos", ru: "Термос", en: "Thermos" } },
            { id: 4, prices: 100, names: { uz: "Qo'lqop", ru: "Строительные перчатки", en: "Gloves" } }
        ];

        // Tilni yangilash funksiyasi
        function updateUI() {
            const lang = translations[currentLang];
            
            document.getElementById('lang-balance-title').innerText = lang.balance_title;
            document.getElementById('lang-ball-text').innerText = lang.ball_text;
            document.getElementById('lang-top-title').innerText = lang.top_title;
            document.getElementById('lang-input-title').innerText = lang.input_title;
            document.getElementById('lang-submit-btn').innerText = lang.submit_btn;
            document.getElementById('lang-shop-title').innerText = lang.shop_title;
            document.getElementById('lang-settings-title').innerText = lang.settings_title;
            document.getElementById('lang-select-lang').innerText = lang.select_lang;
            document.getElementById('lang-support').innerText = lang.support;
            document.getElementById('lang-nav-main').innerText = lang.nav_main;
            document.getElementById('lang-nav-code').innerText = lang.nav_code;
            document.getElementById('lang-nav-shop').innerText = lang.nav_shop;
            document.getElementById('lang-nav-profile').innerText = lang.nav_profile;
            
            document.getElementById('language-select').value = currentLang;

            renderTopList();
            renderShop();
        }

        function changeLanguage(langCode) {
            currentLang = langCode;
            localStorage.setItem('selectedLanguage', langCode);
            updateUI();
        }

        // TOP 5 talikni tilda chiqarish
        function renderTopList() {
            const topListContainer = document.getElementById('top-list');
            topListContainer.innerHTML = '';
            const lang = translations[currentLang];

            if (globalTopData && globalTopData.length > 0) {
                globalTopData.forEach((user, index) => {
                    topListContainer.innerHTML += `
                        <div class="top-item">
                            <span>${index + 1}. @${user.username}</span>
                            <span style="color: #ff6600; font-weight:bold;">${user.balance} ${lang.ball_text}</span>
                        </div>`;
                });
            } else {
                for(let i=1; i<=5; i++) {
                    topListContainer.innerHTML += `
                        <div class="top-item">
                            <span>${i}. </span>
                            <span style="color:#444">${lang.no_points}</span>
                        </div>`;
                }
            }
        }

        // Do'konni tanlangan tilda chizish
        function renderShop() {
            const container = document.getElementById('product-container');
            container.innerHTML = '';
            const lang = translations[currentLang];

            products.forEach(p => {
                const productName = p.names[currentLang];
                container.innerHTML += `
                    <div class="product-card">
                        <div class="product-name">${productName}</div>
                        <div class="product-price">${p.prices} ${lang.ball_text}</div>
                        <button class="buy-btn" onclick="buyItem('${productName}', ${p.prices})">${lang.buy_btn}</button>
                    </div>`;
            });
        }

        // Botdan kelgan ma'lumotni URL orqali qabul qilish
        const urlParams = new URLSearchParams(window.location.search);
        const rawData = urlParams.get('data');
        
        if (rawData) {
            try {
                const parsedData = JSON.parse(decodeURIComponent(rawData));
                userBalance = parsedData.balance;
                document.getElementById('user-balance').innerText = userBalance;
                globalTopData = parsedData.top;
            } catch (e) {
                console.error("Xatolik:", e);
            }
        }

        function switchTab(tabId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active-nav'));
            document.getElementById('page-' + tabId).classList.add('active-page');
            element.classList.add('active-nav');
        }

        function sendCodeToBot() {
            const codeInput = document.getElementById('promo-code').value.trim().toUpperCase();
            if(codeInput.length !== 6) { 
                alert(translations[currentLang].alert_length); 
                return; 
            }
            tg.sendData(JSON.stringify({ action: "submit_code", code: codeInput }));
            tg.close();
        }

        function buyItem(name, price) {
            if (userBalance < price) { 
                alert(translations[currentLang].alert_no_ball); 
                return; 
            }
            
            let text = translations[currentLang].confirm_buy;
            // Dinamik matn almashtirish
            if(currentLang === 'uz') text = `${name} ${text.replace("{price}", price)}`;
            else text = text.replace("{name}", name).replace("{price}", price);

            if (confirm(text)) {
                tg.sendData(JSON.stringify({ action: "purchase", product: name, price: price }));
                tg.close();
            }
        }

        function openSupport() { 
            tg.openTelegramLink("https://t.me/startmix_manager"); 
        }

        // Birinchi marta kirganda interfeysni chizish
        updateUI();
    </script>
</body>
</html>
